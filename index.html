<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AurneO Digital</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      overflow-x: hidden;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 60px;
      background: linear-gradient(90deg, #00f5ff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: float 3s ease-in-out infinite;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
      max-width: 600px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      border-radius: 30px;
      border: none;
      background: #a855f7;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      background: #00f5ff;
      color: black;
    }

    /* CARDS */
    .section {
      padding: 80px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      width: 250px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) rotateX(10deg);
      background: rgba(255,255,255,0.1);
    }

    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>AurneO Digital</h1>
    <p>We build high-converting digital marketing systems, ads, and websites that bring real clients.</p>
    <button class="btn">Get Started</button>
  </div>

  <div class="section">
    <h2>Our Services</h2>
    <div class="cards">
      <div class="card">Meta Ads Growth</div>
      <div class="card">Lead Generation</div>
      <div class="card">SEO Optimization</div>
      <div class="card">Website Development</div>
    </div>
  </div>

</body>
</html>
