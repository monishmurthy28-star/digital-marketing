<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AurneO Digital</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#050816;
  color:white;
  overflow:hidden;
}

/* canvas background */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

h1 {
  font-size:70px;
  background:linear-gradient(90deg,#22d3ee,#a855f7,#60a5fa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p {
  max-width:650px;
  opacity:0.8;
  font-size:18px;
  line-height:1.6;
}

.btn {
  margin-top:20px;
  padding:14px 28px;
  border:none;
  border-radius:999px;
  background:linear-gradient(90deg,#7c3aed,#06b6d4);
  color:white;
}

/* sections */
.section {
  position:absolute;
  bottom:40px;
  width:100%;
  text-align:center;
  opacity:0.85;
  font-size:14px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="hero">
  <h1>AurneO Digital</h1>
  <p>AI-powered marketing systems that generate leads, automate growth, and scale businesses using high-conversion digital funnels.</p>
  <button class="btn">Get Started</button>
</div>

<div class="section">
  🚀 Meta Ads | AI Funnels | Lead Generation | SaaS Landing Pages
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5)*1.2,
    dy:(Math.random()-0.5)*1.2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let p of particles){
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(124,58,237,0.5)";
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
